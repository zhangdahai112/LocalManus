# Production override for docker-compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      - "1243:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx

  # AIO Sandbox service - shared sandbox for all users in ONLINE mode
  sandbox:
    image: ghcr.io/agent-infra/sandbox:1.0.0.150
    container_name: localmanus-sandbox
    security_opt:
      - seccomp:unconfined
    ports:
      - "8080:8080"
    environment:
      - VNC_PASSWORD=localmanus
    restart: unless-stopped
    networks:
      - localmanus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    environment:
      - DATABASE_URL=sqlite:///./db/localmanus.db
      - UPLOAD_SIZE_LIMIT=10485760
      - SANDBOX_MODE=online
      - SANDBOX_LOCAL_URL=http://sandbox:8080
    depends_on:
      sandbox:
        condition: service_healthy

  ui:
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://47.121.183.184:1243
      - BACKEND_URL=http://backend:8000

volumes:
  nginx_logs:
    driver: local
